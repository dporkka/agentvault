name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: Build CLI
        working-directory: ${{ github.workspace }}
        run: make build
      - name: Smoke test CLI
        working-directory: ${{ github.workspace }}
        run: make smoke
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentvault-cli-linux-amd64
          path: bin/agentvault

  frontends:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - web-local
          - browser-extension
          - desktop-wails/frontend
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build # runs `tsc && vite build`

  mobile:
    name: Mobile (Expo type-check and bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile-expo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/mobile-expo/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Bundle iOS with Metro
        run: npx expo export --platform ios

  desktop:
    name: Desktop (Wails build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/desktop-wails/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop-wails/frontend/package-lock.json
      - name: Install GTK/WebKit system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build frontend (required by //go:embed frontend/dist)
        working-directory: apps/desktop-wails/frontend
        run: |
          npm ci
          npm run build
      - name: Build desktop app (Go)
        working-directory: apps/desktop-wails
        # Ubuntu ships webkit2gtk 4.1, so the webkit2_41 build tag is required.
        run: go build -tags webkit2_41 ./...

  contract:
    name: Contract (shared client types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install contract package dependencies
        run: |
          cd packages/contract
          npm ci
      - name: Run contract tests
        run: |
          cd packages/contract
          npm test
      - name: Install app dependencies for type-check
        run: |
          (cd apps/web-local && npm ci)
          (cd apps/browser-extension && npm ci)
          (cd apps/mobile-expo && npm ci)
          (cd apps/desktop-wails/frontend && npm ci)
      - name: Run contract check
        run: make contract-check

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [core, frontends, mobile, desktop, contract]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/browser-extension/package-lock.json
            apps/desktop-wails/frontend/package-lock.json

      - name: Install browser extension dependencies
        working-directory: apps/browser-extension
        run: npm ci

      - name: Build browser extension
        working-directory: apps/browser-extension
        run: npm run build

      - name: Package browser extension
        run: make package-extension

      - name: Install desktop system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        run: make desktop

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload browser extension release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/agentvault-extension-*.zip --clobber

      - name: Upload desktop release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" apps/desktop-wails/build/bin/* --clobber
